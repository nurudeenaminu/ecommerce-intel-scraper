name: Weekly Rescrape

on:
  schedule:
    - cron: '0 2 * * 0'    # Every Sunday at 2am UTC
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas tiktoken textblob \
                      chromadb sentence-transformers rank-bm25 \
                      google-genai playwright-stealth
          playwright install chromium
          python -m textblob.download_corpora

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper.py
          python cleaner.py
          python chunker.py
          python loader.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/chunks/products_chunks.jsonl chroma_db/
          git diff --staged --quiet || git commit -m "data: automated weekly rescrape $(date +'%Y-%m-%d')"
          git push